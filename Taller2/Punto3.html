<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Punto 3</title>
    </head>
        <body style="text-align:center; font-family: Verdana, Geneva, Tahoma, sans-serif;">
            <h1 style="display: block;">
                INPUTS
            </h1>
            <input type="text" placeholder="text" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="password" placeholder="password" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="radio" title="radio" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: pointer; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="checkbox" title="checkbox" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: pointer; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="button" value="button" style="display: block; margin: 10px auto; border: 4px solid #CC00CC; border-radius: 5px; cursor: pointer; font-size:large;" onmousedown="this.style.borderColor='#990099';" onmouseup="this.style.borderColor='#CC00CC';">
            <input type="email" placeholder="email" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="file" title="file" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="hidden" title="hidden" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="image" placeholder="text" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="number" placeholder="number" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="range" title="range" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: pointer; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="search" placeholder="search" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="tel" placeholder="tel" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="time" title="time" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: text; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="date" title="date" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: text; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="datetime-local" title="datetime-local" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: text; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="week" title="week" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: text; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="month" title="month" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: text; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="submit" value="submit" style="display: block; margin: 10px auto; border: 4px solid #CC00CC; border-radius: 5px; cursor: pointer; font-size:large;" onmousedown="this.style.borderColor='#990099';" onmouseup="this.style.borderColor='#CC00CC';">
            <input type="url" placeholder="url" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
            <input type="reset" value="reset" style="display: block; margin: 10px auto; border: 4px solid #CC00CC; border-radius: 5px; cursor: pointer; font-size:large;" onmousedown="this.style.borderColor='#990099';" onmouseup="this.style.borderColor='#CC00CC';">
            <input type="color" title="color" style="display: block; margin: 10px auto;border: 4px solid #CC00CC; border-radius: 5px; cursor: pointer; background-clip: padding-box; padding: 3px; outline:none; box-shadow:none; font-size: large;">
    </body>
</html>
